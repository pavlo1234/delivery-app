# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - delivery-app-server

env:
    AZURE_WEBAPP_NAME: "delivery-app-server"
    AZURE_WEBAPP_PACKAGE_PATH: "./server"
    NODE_VERSION: "24.x"
on:
    push:
        branches:
            - master
    workflow_dispatch:

jobs:
    build-deploy:
        runs-on: ubuntu-latest
        permissions:
            contents: read #This is required for actions/checkout
            id-token: write #This is required for requesting the JWT

        steps:
            - uses: actions/checkout@v4

            - name: Set up Node.js version
              uses: actions/setup-node@v4
              with:
                  node-version: "24.x"

            - name: npm install, build, and test
              run: |
                  npm install
                  npm run build --if-present
                  npm run test --if-present
              working-directory: ${{env.AZURE_WEBAPP_PACKAGE_PATH}}

            - name: Login to Azure
              uses: azure/login@v2
              with:
                  client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_69CAEF96E5E447A2BC0B471323687BB3 }}
                  tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A64A3886C81542B88CD801C0E89B4A4B }}
                  subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_895CD2E2E0504A81BF5C3F493278CB39 }}

            - name: "Deploy to Azure Web App"
              id: deploy-to-webapp
              uses: azure/webapps-deploy@v3
              with:
                  app-name: ${{ env.AZURE_WEBAPP_NAME }}
                  slot-name: "Production"
                  package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

            - name: logout
              run: |
                  az logout
